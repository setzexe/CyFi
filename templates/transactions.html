<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>All Transactions | CyFi</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">CYFI</p>
        <h1>All Transactions</h1>
        <p class="subtitle">Newest first across all accounts.</p>
      </div>
      <a class="ghost-btn" href="{{ url_for('home') }}">Back to Dashboard</a>
    </header>

    <main class="layout transactions-layout">
      <section class="card transaction-list-card">
        <h2>Recent Deposits</h2>
        <ul id="depositsList" class="stack scroll-stack"></ul>
      </section>

      <section class="card transaction-list-card">
        <h2>Recent Transactions</h2>
        <ul id="transactionsList" class="stack scroll-stack"></ul>
      </section>
    </main>

    <script src="{{ url_for('static', filename='transactions.js') }}"></script>
  </body>
</html>
