<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Transactions | CyFi</title>
    <link rel="preload" as="image" href="{{ url_for('static', filename='images/aero-bg.png') }}" />
    <style>
      html {
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(135deg, rgba(235, 255, 247, 0.18), rgba(88, 181, 255, 0.16), rgba(123, 219, 69, 0.12)),
          url("{{ url_for('static', filename='images/aero-bg.png') }}"),
          linear-gradient(135deg, #70c1ff, #a0d85a);
        background-size: cover, cover, cover;
        background-position: center center, center center, center center;
        background-attachment: fixed, fixed, fixed;
      }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='transactions.css') }}" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">CYFI</p>
        <h1>All Transactions</h1>
        <p class="subtitle">Newest first across all accounts.</p>
      </div>
      <div class="topbar-actions">
        <a class="ghost-btn" href="{{ url_for('home') }}">Back to Dashboard</a>
        <form action="{{ url_for('logout') }}" method="post">
          <button class="ghost-btn" type="submit">Log Out</button>
        </form>
      </div>
    </header>

    <main class="layout transactions-layout">
      <section class="card transaction-list-card">
        <h2>Recent Deposits</h2>
        <ul id="depositsList" class="stack scroll-stack"></ul>
      </section>

      <section class="card transaction-list-card">
        <h2>Recent Transactions</h2>
        <ul id="transactionsList" class="stack scroll-stack"></ul>
      </section>
    </main>

    <script src="{{ url_for('static', filename='transactions.js') }}"></script>
  </body>
</html>
