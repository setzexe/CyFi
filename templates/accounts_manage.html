<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manage Accounts | CyFi</title>
    <link rel="preload" as="image" href="{{ url_for('static', filename='images/aero-bg.png') }}" />
    <style>
      html {
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(135deg, rgba(235, 255, 247, 0.18), rgba(88, 181, 255, 0.16), rgba(123, 219, 69, 0.12)),
          url("{{ url_for('static', filename='images/aero-bg.png') }}"),
          linear-gradient(135deg, #70c1ff, #a0d85a);
        background-size: cover, cover, cover;
        background-position: center center, center center, center center;
        background-attachment: fixed, fixed, fixed;
      }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='account_manage.css') }}" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">CYFI</p>
        <h1>Manage Accounts</h1>
        <p class="subtitle">Create new accounts or remove old ones</p>
      </div>
      <div class="topbar-actions">
        <a class="ghost-btn" href="{{ url_for('home') }}">Back to Dashboard</a>
        <form action="{{ url_for('logout') }}" method="post">
          <button class="ghost-btn" type="submit">Log Out</button>
        </form>
      </div>
    </header>

    <main class="layout">
      <section class="card summary-card">
        <h2>Account Summaries</h2>
        <p class="total">Total Balance: <strong id="manageTotalBalance">$0.00</strong></p>
        <ul id="manageAccountsList" class="stack scroll-stack account-summary-stack"></ul>
      </section>

      <section class="card action-card">
        <h2>Add or Delete Account</h2>
        <p class="hint">All actions are recorded with a timestamp.</p>

        <form id="accountActionForm" novalidate>
          <label for="accountAction">Action</label>
          <select id="accountAction" required>
            <option value="create">Add Account</option>
            <option value="delete">Delete Account</option>
          </select>

          <div id="addFields">
            <label for="newAccountName">Account Name</label>
            <input id="newAccountName" type="text" maxlength="80" placeholder="Brokerage, Travel, etc" required />

            <label for="newStartingBalance">Starting Balance</label>
            <input id="newStartingBalance" type="text" inputmode="decimal" autocomplete="off" placeholder="0.00" required />

            <label for="newAccountNote">Note (optional)</label>
            <input id="newAccountNote" type="text" placeholder="Optional context" />
          </div>

          <div id="deleteFields" class="hidden">
            <label for="deleteAccountId">Account to Delete</label>
            <select id="deleteAccountId"></select>

            <label for="deleteReason">Reason (optional)</label>
            <input id="deleteReason" type="text" placeholder="Optional context" />

            <label class="confirm-row" for="deleteConfirm">
              <input id="deleteConfirm" type="checkbox" />
              <span>I confirm this account should be deleted.</span>
            </label>
          </div>

          <button id="submitActionBtn" class="primary-btn" type="submit">Create Account</button>
        </form>

        <p id="actionMessage" class="message" role="status" aria-live="polite"></p>
      </section>

      <section class="card history-card">
        <h2>Account History</h2>
        <ul id="manageHistoryList" class="stack scroll-stack account-history-stack"></ul>
      </section>
    </main>

    <script src="{{ url_for('static', filename='account_manage.js') }}"></script>
  </body>
</html>
