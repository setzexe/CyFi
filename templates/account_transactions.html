<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ account_name }} Transactions | CyFi</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">CYFI</p>
        <h1 id="accountTitle">{{ account_name }}</h1>
        <p class="subtitle">Current Balance: <strong id="accountBalance">${{ account_balance }}</strong></p>
      </div>
      <a class="ghost-btn" href="{{ url_for('home') }}">Back to Dashboard</a>
    </header>

    <main class="layout">
      <section class="card">
        <h2>Transactions</h2>
        <ul id="accountTransactionsList" class="stack"></ul>
      </section>
    </main>

    <script>
      window.CYFI_ACCOUNT_ID = {{ account_id }};
    </script>
    <script src="{{ url_for('static', filename='account_transactions.js') }}"></script>
  </body>
</html>
