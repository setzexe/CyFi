<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ account_name }} Transactions | CyFi</title>
      <link rel="preload" as="image" href="{{ url_for('static', filename='images/aero-bg.png') }}" />
      <style>
        html {
          min-height: 100%;
        }

        body {
          min-height: 100vh;
          margin: 0;
          background:
            linear-gradient(135deg, rgba(235, 255, 247, 0.18), rgba(88, 181, 255, 0.16), rgba(123, 219, 69, 0.12)),
            url("{{ url_for('static', filename='images/aero-bg.png') }}"),
            linear-gradient(135deg, #70c1ff, #a0d85a);
          background-size: cover, cover, cover;
          background-position: center center, center center, center center;
          background-attachment: fixed, fixed, fixed;
        }
      </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">CYFI</p>
        <h1 id="accountTitle">{{ account_name }}</h1>
        <p class="subtitle">Current Balance: <strong id="accountBalance">${{ account_balance }}</strong></p>
      </div>
      <div class="topbar-actions">
        <a class="ghost-btn" href="{{ url_for('home') }}">Back to Dashboard</a>
        <form action="{{ url_for('logout') }}" method="post">
          <button class="ghost-btn" type="submit">Log Out</button>
        </form>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <h2>Transactions</h2>
        <ul id="accountTransactionsList" class="stack"></ul>
      </section>
    </main>

    <script>
      window.CYFI_ACCOUNT_ID = {{ account_id }};
    </script>
    <script src="{{ url_for('static', filename='account_transactions.js') }}"></script>
  </body>
</html>
