<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign Up | CyFi</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-card">
        <p class="eyebrow">CYFI</p>
        <h1>Create Account</h1>
        <p class="subtitle">Start with a private workspace for your accounts and transactions.</p>

        <form method="post" novalidate>
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required />

          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="new-password" required />

          <label for="confirm_password">Confirm Password</label>
          <input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" required />

          <button class="primary-btn" type="submit">Sign Up</button>
        </form>

        <p class="security-note">
          Passwords are hashed, but this is a low-stakes manual tracker. Do not reuse an important password.
        </p>

        {% if error %}
          <p class="message error" role="alert">{{ error }}</p>
        {% else %}
          <p class="message" aria-hidden="true"></p>
        {% endif %}

        <p class="auth-switch">Already have an account? <a href="{{ url_for('login_page') }}">Log in</a></p>
      </section>
    </main>
  </body>
</html>
